openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HelpIT - IT Helpdesk API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: tickets
    description: Support tickets
  - name: assets
    description: IT asset inventory
  - name: users
    description: User management
  - name: comments
    description: Ticket comments
  - name: ratings
    description: Ticket satisfaction ratings
  - name: stats
    description: Dashboard statistics
  - name: attachments
    description: Ticket file attachments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /tickets:
    get:
      operationId: getTickets
      tags: [tickets]
      summary: List tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/stats:
    get:
      operationId: getTicketStats
      tags: [stats]
      summary: Dashboard statistics for tickets
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStats"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not found
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tickets/{id}/comments:
    get:
      operationId: getTicketComments
      tags: [comments]
      summary: Get comments for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: addComment
      tags: [comments]
      summary: Add a comment to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /tickets/{id}/rating:
    post:
      operationId: rateTicket
      tags: [ratings]
      summary: Rate a resolved ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Rating saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

  /tickets/{id}/attachments:
    get:
      operationId: getTicketAttachments
      tags: [attachments]
      summary: Get attachments for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"

  /assets:
    get:
      operationId: getAssets
      tags: [assets]
      summary: List assets
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUpdate"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assets/by-code/{code}:
    get:
      operationId: getAssetByCode
      tags: [assets]
      summary: Get asset by QR/barcode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, technician, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [user, technician, admin]

    Ticket:
      type: object
      required: [id, title, description, category, priority, status, createdById, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [hardware, software, network, access]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        createdById:
          type: integer
        assignedToId:
          type: ["integer", "null"]
        assetId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        createdBy:
          $ref: "#/components/schemas/User"
        assignedTo:
          type: ["object", "null"]
          properties:
            id: { type: integer }
            name: { type: string }
            email: { type: string }
        asset:
          type: ["object", "null"]
          properties:
            id: { type: integer }
            name: { type: string }
            code: { type: string }
        rating:
          type: ["integer", "null"]

    TicketInput:
      type: object
      required: [title, description, category]
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
          minLength: 10
        category:
          type: string
          enum: [hardware, software, network, access]
        assetId:
          type: ["integer", "null"]

    TicketUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [hardware, software, network, access]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        assignedToId:
          type: ["integer", "null"]
        assetId:
          type: ["integer", "null"]

    TicketStats:
      type: object
      required: [total, open, inProgress, resolved, critical, avgResolutionHours, byCategory, byPriority]
      properties:
        total:
          type: integer
        open:
          type: integer
        inProgress:
          type: integer
        resolved:
          type: integer
        critical:
          type: integer
        avgResolutionHours:
          type: number
        byCategory:
          type: array
          items:
            type: object
            required: [category, count]
            properties:
              category: { type: string }
              count: { type: integer }
        byPriority:
          type: array
          items:
            type: object
            required: [priority, count]
            properties:
              priority: { type: string }
              count: { type: integer }

    Comment:
      type: object
      required: [id, ticketId, userId, content, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        userId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            role: { type: string }

    CommentInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    Rating:
      type: object
      required: [id, ticketId, userId, stars, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        userId:
          type: integer
        stars:
          type: integer
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time

    RatingInput:
      type: object
      required: [stars]
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5

    Attachment:
      type: object
      required: [id, ticketId, uploadedById, filename, originalName, mimetype, url, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        uploadedById:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        mimetype:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time

    Asset:
      type: object
      required: [id, name, type, code, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [pc, laptop, printer, server, monitor, other]
        code:
          type: string
        location:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    AssetInput:
      type: object
      required: [name, type, code]
      properties:
        name:
          type: string
          minLength: 2
        type:
          type: string
          enum: [pc, laptop, printer, server, monitor, other]
        code:
          type: string
          minLength: 3
        location:
          type: string
        serialNumber:
          type: string
        notes:
          type: string

    AssetUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [pc, laptop, printer, server, monitor, other]
        location:
          type: string
        serialNumber:
          type: string
        notes:
          type: string
